apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "if-api.fullname" . }}
  labels:
    {{- include "if-api.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "if-api.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "if-api.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "if-api.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
      - name: {{ .Chart.Name }}
        {{- with .Values.securityContext }}
        securityContext:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - name: http
          containerPort: {{ .Values.service.port }}
        {{- with .Values.livenessProbe }}
        livenessProbe:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- with .Values.readinessProbe }}
        readinessProbe:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- with .Values.startupProbe }}
        startupProbe:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- with .Values.resources }}
        resources:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- with .Values.env }}
        {{- if or .secret .configMap .existingSecret.name .existingConfigMap.name }}
        envFrom:
        {{- end }}
        {{- if .secret }}
        - secretRef:
            name: env-vars
        {{- end }}
        {{- if .configMap }}
        - configMapRef:
            name: env-vars
        {{- end }}
        {{- if .existingSecret.name }}
        - secretRef:
            name: {{ .existingSecret.name }}
            {{- with .existingSecret.prefix }}
            prefix: {{ . }}
            {{- end }}
        {{- end }}
        {{- if .existingConfigMap.name }}
        - configMapRef:
            name: {{ .existingConfigMap.name }}
            {{- with .existingConfigMap.prefix }}
            prefix: {{ . }}
            {{- end }}
        {{- end }}
        {{- end }}
        {{- if or .Values.additionalPlugins .Values.npmrc.data .Values.volumes }}
        volumeMounts:
        {{- end }}
        {{- if .Values.additionalPlugins }}
        - name: additional-plugins
          mountPath: /app/plugins.txt
          subPath: plugins.txt
        {{- end }}
        {{- if .Values.npmrc.data }}
        - name: npmrc
          mountPath: /app/.npmrc
          subPath: .npmrc
        {{- end }}
        {{- with .Values.volumeMounts }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- if or .Values.additionalPlugins .Values.npmrc.data .Values.volumes }}
      volumes:
      {{- end }}
      {{- if .Values.additionalPlugins }}
      - name: additional-plugins
        configMap:
          name: additional-plugins
      {{- end }}
      {{- if .Values.npmrc.data }}
      - name: npmrc
        {{- if .Values.npmrc.useConfigMap }}
        configMap:
          name: npmrc
        {{- else }}
        secret:
          secretName: npmrc
        {{- end }}
      {{- end }}
      {{- with .Values.volumes }}
      {{- toYaml . | nindent 6 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
      {{- toYaml . | nindent 6 }}
      {{- end }}
